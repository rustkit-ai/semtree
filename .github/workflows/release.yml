name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            cross: false

          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

          # windows excluded: usearch v2 uses POSIX-only mmap (MAP_FAILED)

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p semtree-cli

      - name: Package
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/semtree"
          ARCHIVE="semtree-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: semtree-${{ matrix.target }}.*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md 2>/dev/null || true)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          name: "semtree ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: artifacts/**
          fail_on_unmatched_files: true

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order, skipping already-published versions
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish() {
            local pkg=$1
            local out
            out=$(cargo publish -p "$pkg" 2>&1) && { echo "$out"; return 0; }
            if echo "$out" | grep -q "already exists on crates.io"; then
              echo "⏭  $pkg: already published, skipping"
              return 0
            fi
            echo "$out" >&2
            return 1
          }
          publish semtree-core  && sleep 30
          publish semtree-parse && sleep 30
          publish semtree-embed && sleep 30
          publish semtree-store && sleep 30
          publish semtree-rag   && sleep 30
          publish semtree-cli
          # semtree-analyze: publish = false (API incomplete, not ready)
