name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order. Sleep between each to let crates.io index.
      - name: Publish semtree-core
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p semtree-core
      - run: sleep 25

      - name: Publish semtree-embed
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p semtree-embed
      - run: sleep 25

      - name: Publish semtree-parse
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p semtree-parse
      - run: sleep 25

      - name: Publish semtree-store
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p semtree-store
      - run: sleep 25

      - name: Publish semtree-rag
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p semtree-rag
      - run: sleep 25

      - name: Publish semtree-cli
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p semtree-cli
      # semtree-analyze skipped — publish = false (alpha)

  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: semtree-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: semtree-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: semtree-macos-aarch64
          # windows-latest excluded: usearch v2 uses POSIX-only mmap (MAP_FAILED)

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p semtree-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/semtree
            target/${{ matrix.target }}/release/semtree.exe
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
